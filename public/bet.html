<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזנת ניחושים - מונדיאל</title>
    <style>
        body { font-family: system-ui, Arial; background: #eef2f3; padding: 20px; direction: rtl; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1e3c72; text-align: center; margin-top: 0; }
        .group-title { text-align: center; color: #7f8c8d; font-size: 18px; font-weight: bold; margin-bottom: 20px; background: #f8f9fa; padding: 8px; border-radius: 6px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #218838; }
        .link-btn { background: #007bff; display: block; text-align: center; text-decoration: none; color: white; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-weight: bold; }
        .welcome-msg { background: #e2f0d9; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 15px; font-weight: bold; color: #385723; }
        #registerScreen { display: none; }
        #bettingScreen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="groupNameHeader" class="group-title">טוען נתוני קבוצה...</div>

    <div id="registerScreen">
        <h2>👋 ברוך הבא לטורניר!</h2>
        <p>נראה שזו הכניסה הראשונה שלך מקבוצת הוואטסאפ. איך קוראים לך?</p>
        <div class="form-group">
            <label>שם מלא לקבוצה:</label>
            <input type="text" id="userNameInput" placeholder="הקלד שם פרטי ומשפחה">
        </div>
        <button onclick="joinGroup()">הצטרף לקבוצה והמשך להימורים</button>
    </div>

    <div id="bettingScreen">

        <div id="welcomeUser" class="welcome-msg" style="display: inline-flex; justify-content: center; align-items: center; gap: 6px; width: 100%; text-align: center; direction: rtl; white-space: nowrap;">
            <span id="welcomeUserText" style="text-align: center;"></span>
            <button id="editNicknameBtn" onclick="enterNicknameEditMode()" style="background: #d7ebd7; color: #385723; border: 1px solid #c4ddc3; padding: 6px; border-radius: 50%; cursor: pointer; font-size: 16px; line-height: 1; width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; box-shadow: none;">✏️</button>
        </div>
        <div id="nicknameEditSection" style="display: none; background: #f8f9fa; padding: 16px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e0e0e0; box-sizing: border-box; width: 100%; direction: rtl;">
            <label style="font-weight: bold; font-size: 15px; display: block; margin-bottom: 10px; color: #333; text-align: right;">שנה כינוי בקבוצה זו:</label>
            <input type="text" id="userNicknameInput" style="width: 100%; height: 42px; padding: 0 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; background: white; color: #333; display: block; margin-bottom: 12px; text-align: right;">
            <div style="display: flex; gap: 10px; justify-content: flex-start; flex-wrap: wrap;">
                <button id="saveNicknameBtn" onclick="saveUserNickname()" style="background: #28a745; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold;">שמור</button>
                <button id="cancelNicknameBtn" onclick="cancelNicknameEdit()" style="background: #6c757d; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold;">בטל</button>
            </div>
            <div id="nicknameStatus" style="font-size: 13px; margin-top: 8px; font-weight: bold; text-align: right;"></div>
        </div>
        <h2>🏆 הימורי המונדיאל שלי 🏆</h2>
        <div id="paymentStatusBlock" style="margin-bottom: 18px; padding: 18px; border-radius: 12px; background: #eef7ff; border: 1px solid #b8d7ff;">
            <div id="paymentStatusText" style="font-weight: bold; color: #0f5132; margin-bottom: 8px;">טוען סטטוס תשלום...</div>
            <div id="paymentAmountText" style="color: #084298; margin-bottom: 12px;"></div>
            <a id="payboxLinkBtn" href="#" target="_blank" class="link-btn" style="display:inline-flex;">💳 תשלום ב-PayBox</a>
        </div>
        
        <div class="form-group">
            <label>🥇 מקום ראשון (האלופה)</label>
            <select id="teamFirst">
                <option value="">טוען נבחרות...</option>
            </select>
        </div>
        <div class="form-group">
            <label>🥈 מקום שני (סגנית)</label>
            <select id="teamSecond">
                <option value="">טוען נבחרות...</option>
            </select>
        </div>
       <div class="form-group">
        <div class="form-group">
            <label>⚽ מלך השערים (מקום 1)</label>
            <select id="scorerFirst">
                <option value="">טוען מועמדים...</option>
            </select>
        </div>
        <button onclick="savePredictions()">שמור את הניחושים שלי</button>
        <div style="margin-top: 12px; margin-bottom: 15px;">
            <a id="cancelBackLink" href="/index.html" style="display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 12px 15px; background: #6c757d; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; gap: 6px; box-sizing: border-box;">⬅️ ביטול וחזרה ללובי</a>
        </div>
    </div>
</div>

<script>
  
const urlParams = new URLSearchParams(window.location.search);
const CURRENT_GROUP_ID = urlParams.get('groupId') || "group_test123"; 

let CURRENT_USER_ID = null;
let CURRENT_USER_NAME = null;
let CURRENT_GROUP_DATA = null;

// פונקציה לטעינת פרטי הקבוצה מהשרת (מעודכנת עם חסימת נעילה)
async function fetchGroupDetails() {
    try {
        const res = await fetch(`/api/groups/${CURRENT_GROUP_ID}`);
        if (res.ok) {
            const data = await res.json();
            document.getElementById('groupNameHeader').innerText = `קבוצה: ${data.group.group_name}`;
            
            CURRENT_GROUP_DATA = data.group;
            if(data.group.paybox_link) {
                document.getElementById('payboxLinkBtn').href = data.group.paybox_link;
                document.getElementById('payboxLinkBtn').style.display = 'inline-flex';
            } else {
                document.getElementById('payboxLinkBtn').style.display = 'none';
            }

            updatePaymentStatusUI();

            // 🔥 בדיקה האם המנהל נעל את ההימורים לקבוצה זו
            if (data.group && data.group.betsLocked) {
                disableFormForLock();
            }

        } else {
            document.getElementById('groupNameHeader').innerText = "שגיאה: קבוצה לא קיימת";
        }
    } catch (error) {
        console.error("Error fetching group:", error);
    }
}

function updatePaymentStatusUI() {
    const statusText = document.getElementById('paymentStatusText');
    const amountText = document.getElementById('paymentAmountText');
    const payboxBtn = document.getElementById('payboxLinkBtn');

    if (!CURRENT_GROUP_DATA) {
        if (statusText) statusText.innerText = 'לא ניתן לטעון את סטטוס התשלום.';
        if (amountText) amountText.innerText = '';
        if (payboxBtn) payboxBtn.style.display = 'none';
        return;
    }

    const entryFee = CURRENT_GROUP_DATA.entry_fee || 0;
    const memberInfo = CURRENT_GROUP_DATA.members?.[CURRENT_USER_ID] || {};
    const hasPaid = !!memberInfo.has_paid;
    const amountLabel = entryFee > 0 ? `עלות כניסה: ${entryFee} ₪` : 'עלות כניסה: לא הוגדרה';
    const paidLabel = hasPaid ? 'סטטוס תשלום: שולם ✅' : 'סטטוס תשלום: טרם שולם ⛔';

    if (statusText) statusText.innerText = paidLabel;
    if (amountText) amountText.innerText = amountLabel;
    if (payboxBtn) {
        if (CURRENT_GROUP_DATA.paybox_link) {
            payboxBtn.href = CURRENT_GROUP_DATA.paybox_link;
            payboxBtn.style.display = 'inline-flex';
            payboxBtn.innerText = hasPaid ? '💳 תשלום חוזר ב-PayBox' : '💳 לשלם ב-PayBox';
        } else {
            payboxBtn.style.display = 'none';
        }
    }
}

// 🔐 פונקציית עזר שמכבה את הדף ברגע שההימורים נעולים
function disableFormForLock() {
    // 1. הוספת הודעת אזהרה בולטת בראש העמוד
    if (!document.getElementById('lockAlert')) {
        const alertBox = document.createElement('div');
        alertBox.id = 'lockAlert';
        alertBox.innerHTML = "🛑 <b>ההימורים לקבוצה זו ננעלו!</b> הטורניר החל, ניתן לצפות בניחושים אך לא לשנותם.";
        alertBox.style = "background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; border: 1px solid #f5c6cb;";
        
        // הזרקה בראש הקונטיינר
        const container = document.querySelector('.container');
        if (container) {
            container.insertBefore(alertBox, container.firstChild);
        }
    }

    // 2. השבתת כפתור השמירה
    // (החלף את 'saveBetsBtn' ב-ID האמיתי של כפתור השמירה שלך אם יש לו כזה, או השתמש ב-querySelector)
    const saveBtn = document.getElementById('saveBetsBtn') || document.querySelector('button[onclick*="save"]');
    if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.innerText = "🔒 ההימורים נעולים";
        saveBtn.style.background = "#6c757d";
        saveBtn.style.cursor = "not-allowed";
    }

    // 3. חסימת כל שדות הבחירה (select) והקלט (input) בדף
    const allInputs = document.querySelectorAll('select, input');
    allInputs.forEach(input => {
        input.disabled = true;
    });
}

function checkUserSession() {
    const sessions = JSON.parse(localStorage.getItem('worldcup_sessions') || '{}');
    
    if (sessions[CURRENT_GROUP_ID]) {
        CURRENT_USER_ID = sessions[CURRENT_GROUP_ID].userId;
        CURRENT_USER_NAME = sessions[CURRENT_GROUP_ID].userName;
        
        // 🔥 שורת המחץ: מציבים את השם הקיים בתוך האינפוט של שינוי השם
        if (document.getElementById('userNicknameInput')) {
            document.getElementById('userNicknameInput').value = CURRENT_USER_NAME;
        }

        showBettingScreen();
        
        // אחרי שהמסך מוצג, נטען את ההימורים הקיימים של המשתמש מהשרת
        loadSavedPredictions();
        updatePaymentStatusUI();
    } else {
        document.getElementById('registerScreen').style.display = 'block';
    }
}

async function loadWorldCupTeams() {
    const teamFirst = document.getElementById('teamFirst');
    const teamSecond = document.getElementById('teamSecond');

    if (teamFirst) {
        teamFirst.innerHTML = '<option value="">טוען נבחרות...</option>';
    }
    if (teamSecond) {
        teamSecond.innerHTML = '<option value="">טוען נבחרות...</option>';
    }

    try {
        const res = await fetch('/api/teams/WC');
        const data = await res.json();

        if (!res.ok || !data.success) {
            console.warn('Failed to load WC teams', data);
            const fallback = '<option value="">לא ניתן לטעון נבחרות</option>';
            if (teamFirst) teamFirst.innerHTML = fallback;
            if (teamSecond) teamSecond.innerHTML = fallback;
            return;
        }

        const teams = (data.teams || []).sort((a, b) => a.name.localeCompare(b.name, 'he', { sensitivity: 'base' }));
        const options = teams.map(team => {
            const label = `${team.name}${team.tla ? ' (' + team.tla + ')' : ''}`;
            return `<option value="${team.id}">${label}</option>`;
        }).join('');

        if (teamFirst) {
            teamFirst.innerHTML = '<option value="">בחר נבחרת</option>' + options;
        }
        if (teamSecond) {
            teamSecond.innerHTML = '<option value="">בחר נבחרת</option>' + options;
        }
    } catch (error) {
        console.error('Error loading WC teams:', error);
        const fallback = '<option value="">לא ניתן לטעון נבחרות</option>';
        if (teamFirst) teamFirst.innerHTML = fallback;
        if (teamSecond) teamSecond.innerHTML = fallback;
    }
}

async function loadTopScorerCandidates() {
    const scorerFirst = document.getElementById('scorerFirst');
    if (scorerFirst) {
        scorerFirst.innerHTML = '<option value="">טוען מועמדים...</option>';
    }

    try {
        const res = await fetch('/api/top-scorers-candidates');
        const data = await res.json();

        if (!res.ok) {
            console.warn('Failed to load top scorers candidates', data);
            if (scorerFirst) scorerFirst.innerHTML = '<option value="">לא ניתן לטעון מועמדים</option>';
            return;
        }

        const options = (data || []).map(candidate => `
            <option value="${candidate.id}">${candidate.name}</option>
        `).join('');

        if (scorerFirst) {
            scorerFirst.innerHTML = '<option value="">בחר מועמד</option>' + options;
        }
    } catch (error) {
        console.error('Error loading top scorers candidates:', error);
        if (scorerFirst) scorerFirst.innerHTML = '<option value="">לא ניתן לטעון מועמדים</option>';
    }
}

function showBettingScreen() {
    document.getElementById('registerScreen').style.display = 'none';
    document.getElementById('bettingScreen').style.display = 'block';
    document.getElementById('welcomeUserText').innerText = `מחובר כעת בתור: ${CURRENT_USER_NAME}`;
    document.getElementById('editNicknameBtn').style.display = 'inline-flex';
}

function enterNicknameEditMode() {
    document.getElementById('nicknameEditSection').style.display = 'block';
    document.getElementById('editNicknameBtn').style.display = 'none';
    document.getElementById('userNicknameInput').value = CURRENT_USER_NAME || '';
    document.getElementById('nicknameStatus').innerText = '';
}

function cancelNicknameEdit() {
    document.getElementById('nicknameEditSection').style.display = 'none';
    document.getElementById('editNicknameBtn').style.display = 'inline-flex';
    document.getElementById('nicknameStatus').innerText = '';
}

// 🔥 הפונקציה החדשה שטוענת את הניחושים שכבר נשמרו ומציגה אותם בטופס
async function loadSavedPredictions() {
    try {
        const res = await fetch(`/api/groups/${CURRENT_GROUP_ID}`);
        if (res.ok) {
            const data = await res.json();
            const predictions = data.predictions || {};
            
            // בדיקה האם למשתמש הנוכחי יש כבר הימור שמור בשרת לקבוצה הזו
            if (predictions[CURRENT_USER_ID]) {
                const myPred = predictions[CURRENT_USER_ID];
                
                // עדכון ה-Dropdowns לפי מה שנשמר ב-DB
                if (myPred.teams && myPred.teams.first) {
                    document.getElementById('teamFirst').value = myPred.teams.first;
                }
                if (myPred.teams && myPred.teams.second) {
                    document.getElementById('teamSecond').value = myPred.teams.second;
                }
                if (myPred.scorers && myPred.scorers.first) {
                    document.getElementById('scorerFirst').value = myPred.scorers.first;
                }
            }
            updatePaymentStatusUI();
        }
    } catch (error) {
        console.error("Error loading user predictions:", error);
    }
}

async function joinGroup() {
    const name = document.getElementById('userNameInput').value.trim();
    if(!name) return alert('נא להזין שם כדי להמשיך');

    const res = await fetch('/api/groups/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ groupId: CURRENT_GROUP_ID, name: name })
    });
    
    const data = await res.json();
    if(data.success) {
        const sessions = JSON.parse(localStorage.getItem('worldcup_sessions') || '{}');
        sessions[CURRENT_GROUP_ID] = { userId: data.userId, userName: data.name };
        localStorage.setItem('worldcup_sessions', JSON.stringify(sessions));
        
        CURRENT_USER_ID = data.userId;
        CURRENT_USER_NAME = data.name;
        
        showBettingScreen();
    } else {
        alert('שגיאה בהצטרפות: ' + data.message);
    }
}

async function savePredictions() {
    const payload = {
        groupId: CURRENT_GROUP_ID,
        userId: CURRENT_USER_ID,
        userName: CURRENT_USER_NAME, // נשמר בשביל הלידרבורד
        teams: { first: document.getElementById('teamFirst').value, second: document.getElementById('teamSecond').value, third: "" },
        scorers: { first: document.getElementById('scorerFirst').value, second: "", third: "" }
    };
    
    try {
        const res = await fetch('/api/predictions/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if (data.success) {
            isFormChanged = false;
            window.location.href = '/index.html'; 
        } else {
            alert('שגיאה בשמירה: ' + data.message);
        }
    } catch (error) {
        console.error("Error saving predictions:", error);
        alert('שגיאה בתקשורת עם השרת');
    }
}

const cancelBackLink = document.getElementById('cancelBackLink');
if (cancelBackLink) {
    cancelBackLink.addEventListener('click', function() {
        isFormChanged = false;
    });
}

async function saveUserNickname() {
    const urlParams = new URLSearchParams(window.location.search);
    const groupId = urlParams.get('groupId');
    const sessions = JSON.parse(localStorage.getItem('worldcup_sessions') || '{}');
    
    if (!sessions[groupId]) return;
    
    const userId = sessions[groupId].userId;
    const newUserName = document.getElementById('userNicknameInput').value.trim();
    const statusDiv = document.getElementById('nicknameStatus');

    if (!newUserName) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "נא להזין שם תקין כדי לשמור";
        return;
    }

    try {
        const res = await fetch(`/api/groups/${groupId}/update-username`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, newUserName })
        });
        const data = await res.json();
        
        if (data.success) {
            CURRENT_USER_NAME = data.userName;
            sessions[groupId].userName = data.userName;
            localStorage.setItem('worldcup_sessions', JSON.stringify(sessions));

            document.getElementById('welcomeUser').innerText = `מחובר כעת בתור: ${CURRENT_USER_NAME}`;
            document.getElementById('nicknameEditSection').style.display = 'none';
            document.getElementById('editNicknameBtn').style.display = 'inline-flex';

            statusDiv.style.color = "green";
            statusDiv.innerText = "👤 שמך עודכן בהצלחה במערכת!";
        } else {
            statusDiv.style.color = "red";
            statusDiv.innerText = data.message;
        }
    } catch (e) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "שגיאה בתקשורת";
    }
}

let isFormChanged = false;

// מאזין לכל שינוי בטופס
document.addEventListener('change', function(e) {
    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') {
        isFormChanged = true;
    }
});

// אם המשתמש מנסה לסגור את הטאב או לעזוב ויש שינויים שלא נשמרו
window.addEventListener('beforeunload', function (e) {
    if (isFormChanged) {
        // ביטול הפעולה יקפיץ את הודעת האזהרה הסטנדרטית של הדפדפן
        e.preventDefault();
        e.returnValue = '';
    }
});

// ברגע שהוא לוחץ על כפתור השמירה האמיתי שלך, נכבה את ההתרעה
// (תוסיף את השורה הזו בתוך פונקציית ה-saveBets שלך, רגע לפני ה-fetch לשרת)
isFormChanged = false;

// הרצה
async function initializeBetPage() {
    await Promise.all([fetchGroupDetails(), loadWorldCupTeams(), loadTopScorerCandidates()]);
    checkUserSession();
}

initializeBetPage();

</script>
</body>
</html>
