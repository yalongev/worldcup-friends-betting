<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/design-system.css">
    <script defer src="/stage2-localization.js"></script>
    <script defer src="/stage4-entrance.js"></script>
    <title>ניהול קבוצה ותשלומים</title>
    <style>
        body { font-family: system-ui, Arial; background: #eef2f3; padding: 20px; direction: rtl; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1e3c72; text-align: center; margin-top: 0; }
        .group-title { text-align: center; color: #7f8c8d; font-size: 16px; margin-bottom: 20px; background: #f8f9fa; padding: 8px; border-radius: 6px; }
        
        .member-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .member-name { font-weight: bold; font-size: 16px; }
        
        /* עיצוב כפתור הפעלה/כיבוי של התשלום */
        .btn-toggle { padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; border: 2px solid; font-size: 13px; }
        .status-paid { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .status-unpaid { background: #fffde7; color: #f57f17; border-color: #fff59d; }
        
        .btn-back { display: inline-block; background: #6c757d; color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .payment-summary-box { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
        .summary-item { flex: 1 1 140px; background: #f8f9fa; border: 1px solid #dbeafe; border-radius: 12px; padding: 14px 12px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .summary-label { font-size: 13px; color: #475569; }
        .summary-value { font-size: 20px; font-weight: 700; color: #1e3c72; margin-top: 8px; }
        #entryFeeEditSection,
        #payboxLinkEditSection {
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 180ms ease, transform 180ms ease;
            will-change: opacity, transform;
            display: none;
        }
        #entryFeeEditSection.visible,
        #payboxLinkEditSection.visible {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }
        /* subtle animations for admin card show/hide */
        #groupNameCard, #groupNameEditSection {
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 180ms ease, transform 180ms ease;
            will-change: opacity, transform;
        }
        #groupNameCard.visible, #groupNameEditSection.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/index.html" class="btn-back">⬅️ חזרה ללובי</a>
    <h1>🛠️ פאנל ניהול ותשלומים</h1>
    <div id="groupSubTitle" class="group-title" style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <span id="groupSubTitleText">טוען נתונים...</span>
        <button id="editGroupNameBtn" type="button" onclick="enterGroupNameEditMode()" style="background: #d7ebd7; color: #385723; border: 1px solid #c4ddc3; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 14px; display: none;">✏️</button>
    </div>
    <div id="groupNameCard" class="card" style="display: none; background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <label style="font-weight: bold; display: block; margin-bottom: 8px;">🛠️ שנה שם הקבוצה:</label>
        <span id="groupNameText" style="display: block; font-weight: bold; font-size: 16px; color: #333; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #e0e0e0; margin-bottom: 10px; box-sizing: border-box;"></span>
        <div id="groupNameEditSection" style="display: none; background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e0e0e0; box-sizing: border-box; width: 100%; direction: rtl;">
            <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
                <input type="text" id="groupNameInput" style="flex: 1; min-width: 180px; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
                <button onclick="updateGroupName()" style="background: #17a2b8; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">שמור</button>
                <button type="button" onclick="cancelGroupNameEdit()" style="background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">בטל</button>
            </div>
        </div>
        <div id="groupNameStatus" style="font-size: 13px; margin-top: 5px;"></div>
    </div>
    <div class="admin-card" id="lockSection" style="background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    <h3 style="margin-top: 0; color: #856404;">🔐 נעילת הימורים ותחילת הטורניר</h3>
    <p style="font-size: 14px; margin-bottom: 15px;">ברגע שתנעל את ההימורים, אף משתמש לא יוכל לשנות או להזין ניחוש חדש. מה תרצה לעשות עם משתמשים שלא שילמו?</p>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 8px; font-weight: normal; cursor: pointer;">
            <input type="radio" name="lockMode" value="spectator" checked style="width: auto; margin-left: 8px;"> 
            <b>השאר אותם כצופים:</b> יופיעו בתחתית הלידרבורד עם 0 נקודות ואייקון 🚫
        </label>
        <label style="display: block; font-weight: normal; cursor: pointer;">
            <input type="radio" name="lockMode" value="remove" style="width: auto; margin-left: 8px;"> 
            <b>הסר אותם לחלוטין:</b> הם לא יופיעו בכלל בלוח התוצאות של החברים
        </label>
    </div>
    
    <button type="button" onclick="lockGroupBets()" style="background: #dc3545; color: white; width: auto; padding: 10px 20px;">🔒 נעל הימורים עכשיו</button>
    </div>  

    <h3>👥 סטטוס תשלומים בקבוצה:</h3>
    <div class="payment-summary-box">
        <div class="summary-item">
            <div class="summary-label">💰 עלות לכל משתתף</div>
            <div id="adminEntryFeeVal" class="summary-value">0 ₪</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">✅ סה"כ שולם</div>
            <div id="adminPaidAmountVal" class="summary-value">0 ₪</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">⚠️ סה"כ לא שולם</div>
            <div id="adminUnpaidAmountVal" class="summary-value">0 ₪</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">🔗 קישור PayBox</div>
            <div id="adminPayboxLinkVal" class="summary-value" style="font-size: 14px; line-height: 1.3; word-break: break-all;">לא הוגדר</div>
        </div>
    </div>
    <div id="adminEntryFeeActions" style="margin-bottom: 18px; text-align: center;">
        <button id="entryFeeEditBtn" type="button" onclick="enterEntryFeeEditMode()" style="background: #1e88e5; color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">עדכן עלות כניסה</button>
        <div id="adminEntryFeeHelp" style="margin-top: 8px; color: #555; font-size: 14px;"></div>
    </div>
    <div id="entryFeeEditSection" style="display: none; background: #f8f9fa; padding: 16px; border-radius: 8px; margin-bottom: 18px; border: 1px solid #e0e0e0; box-sizing: border-box;">
        <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center;">
            <input id="entryFeeInput" type="number" placeholder="עלות ב₪" style="flex: 1; min-width: 140px; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
            <button type="button" onclick="saveEntryFee()" style="background: #28a745; color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">שמור</button>
            <button type="button" onclick="cancelEntryFeeEdit()" style="background: #6c757d; color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">בטל</button>
        </div>
        <div id="entryFeeStatus" style="margin-top: 8px; color: #555; font-size: 14px; text-align: center;"></div>
    </div>
    <div id="adminPayboxActions" style="margin-bottom: 18px; text-align: center;">
        <button id="payboxLinkEditBtn" type="button" onclick="enterPayboxLinkEditMode()" style="background: #6f42c1; color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">עדכן קישור PayBox</button>
        <div id="adminPayboxHelp" style="margin-top: 8px; color: #555; font-size: 14px;"></div>
    </div>
    <div id="payboxLinkEditSection" style="display: none; background: #f8f9fa; padding: 16px; border-radius: 8px; margin-bottom: 18px; border: 1px solid #e0e0e0; box-sizing: border-box;">
        <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center;">
            <input id="payboxLinkInput" type="url" placeholder="https://..." style="flex: 1; min-width: 140px; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
            <button type="button" onclick="savePayboxLink()" style="background: #6f42c1; color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">שמור</button>
            <button type="button" onclick="cancelPayboxLinkEdit()" style="background: #6c757d; color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">בטל</button>
        </div>
        <div id="payboxLinkStatus" style="margin-top: 8px; color: #555; font-size: 14px; text-align: center;"></div>
    </div>
    <div id="membersAdminList">
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const CURRENT_GROUP_ID = urlParams.get('groupId') || "group_test123";

function getCurrentSessionUserId() {
    const sessions = JSON.parse(localStorage.getItem('worldcup_sessions') || '{}');
    return sessions[CURRENT_GROUP_ID]?.userId || null;
}

async function loadAdminPanel() {
    try {
        const res = await fetch(`/api/groups/${CURRENT_GROUP_ID}`);
        if (!res.ok) return;

        const data = await res.json();
        const group = data.group;
        
        // 1. עדכון כותרת העמוד הקיימת
        if (document.getElementById('groupSubTitleText')) {
            document.getElementById('groupSubTitleText').innerText = `ניהול קבוצת: ${group.group_name}`;
        } else {
            document.getElementById('groupSubTitle').innerText = `ניהול קבוצת: ${group.group_name}`;
        }

        // 🔥 שורת המחץ: מציבים את שם הקבוצה הנוכחי במקום המתאים
        if (document.getElementById('groupNameText')) {
            document.getElementById('groupNameText').innerText = group.group_name;
        }
        if (document.getElementById('editGroupNameBtn')) {
            document.getElementById('editGroupNameBtn').style.display = 'inline-flex';
        }
        if (document.getElementById('groupNameInput')) {
            document.getElementById('groupNameInput').value = group.group_name;
        }

        // 2. המשך הלוגיקה הרגילה שלך לרנדור רשימת החברים...
        const listContainer = document.getElementById('membersAdminList');
        listContainer.innerHTML = "";

        const entryFee = group.entry_fee !== undefined && group.entry_fee !== null ? Number(group.entry_fee) : null;
        const memberIds = Object.keys(group.members || {});
        let paidCount = 0;
        let unpaidCount = 0;

        if (memberIds.length === 0) {
            listContainer.innerHTML = `<p style="text-align:center; color:#999;">אין עדיין משתתפים בקבוצה זו.</p>`;
            document.getElementById('adminEntryFeeVal').innerText = entryFee !== null ? `${entryFee} ₪` : 'לא הוגדר';
            document.getElementById('adminPaidAmountVal').innerText = entryFee !== null ? `0 ₪` : 'לא הוגדר';
            document.getElementById('adminUnpaidAmountVal').innerText = entryFee !== null ? `0 ₪` : 'לא הוגדר';
            document.getElementById('adminPayboxLinkVal').innerText = group.paybox_link ? group.paybox_link : 'לא הוגדר';
            document.getElementById('adminEntryFeeActions').style.display = 'block';
            document.getElementById('adminPayboxActions').style.display = 'block';
            if (entryFee === null) {
                document.getElementById('adminEntryFeeHelp').innerText = 'קבוצות ישנות לא שמרו את עלות ההשתתפות. עדכן כאן כדי לראות את הסכומים הנכונים.';
            } else {
                document.getElementById('adminEntryFeeHelp').innerText = '';
            }
            if (!group.paybox_link) {
                document.getElementById('adminPayboxHelp').innerText = 'הוסף כאן קישור PayBox כדי לאפשר תשלום מהמשתתפים בדף ההימורים.';
            } else {
                document.getElementById('adminPayboxHelp').innerText = '';
            }
            return;
        }

        memberIds.forEach(userId => {
            const memberInfo = group.members[userId];
            const userName = memberInfo.userName || "משתתף זמני";
            const isPaid = memberInfo.has_paid;
            if (isPaid) {
                paidCount++;
            } else {
                unpaidCount++;
            }
            
            const row = document.createElement('div');
            row.className = 'member-row';
            
            const btnClass = isPaid ? 'status-paid' : 'status-unpaid';
            const btnText = isPaid ? '✅ שילם (לחץ לביטול)' : '💰 סמן כ"שילם"';

            row.innerHTML = `
                <span class="member-name">${userName}</span>
                <button class="btn-toggle ${btnClass}" onclick="togglePayment('${userId}', ${isPaid})">${btnText}</button>
            `;
            listContainer.appendChild(row);
        });

        const paidAmount = entryFee !== null ? paidCount * entryFee : null;
        const unpaidAmount = entryFee !== null ? unpaidCount * entryFee : null;
        document.getElementById('adminEntryFeeVal').innerText = entryFee !== null ? `${entryFee} ₪` : 'לא הוגדר';
        document.getElementById('adminPaidAmountVal').innerText = entryFee !== null ? `${paidAmount} ₪` : 'לא הוגדר';
        document.getElementById('adminUnpaidAmountVal').innerText = entryFee !== null ? `${unpaidAmount} ₪` : 'לא הוגדר';
        document.getElementById('adminPayboxLinkVal').innerText = group.paybox_link ? group.paybox_link : 'לא הוגדר';
        document.getElementById('adminEntryFeeActions').style.display = 'block';
        document.getElementById('adminPayboxActions').style.display = 'block';
        if (entryFee === null) {
            document.getElementById('adminEntryFeeHelp').innerText = 'קבוצות ישנות לא שמרו את עלות ההשתתפות. עדכן כאן כדי לראות את הסכומים הנכונים.';
        } else {
            document.getElementById('adminEntryFeeHelp').innerText = '';
        }
        if (!group.paybox_link) {
            document.getElementById('adminPayboxHelp').innerText = 'הוסף כאן קישור PayBox כדי לאפשר תשלום מהמשתתפים בדף ההימורים.';
        } else {
            document.getElementById('adminPayboxHelp').innerText = '';
        }

    } catch (error) {
        console.error("Error loading admin:", error);
    }
}

// פונקציה שמעדכנת את השרת בלייב על שינוי סטטוס תשלום
async function togglePayment(userId, currentStatus) {
    const adminUserId = getCurrentSessionUserId();

    try {
        const res = await fetch('/api/groups/toggle-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                groupId: CURRENT_GROUP_ID,
                userId: userId,
                hasPaid: !currentStatus, // הופך את הסטטוס הנוכחי
                adminUserId
            })
        });
        const data = await res.json();
        if (data.success) {
            loadAdminPanel(); // טעינה מחדש של הרשימה המעודכנת
        }
    } catch (error) {
        alert('שגיאה בעדכון התשלום');
    }
}

function enterEntryFeeEditMode() {
    const editSection = document.getElementById('entryFeeEditSection');
    const editBtn = document.getElementById('entryFeeEditBtn');
    const currentText = document.getElementById('adminEntryFeeVal').innerText;
    const currentValue = currentText !== 'לא הוגדר' ? Number(currentText.replace(/[^0-9]/g, '')) : '';

    if (editSection) {
        editSection.style.display = 'block';
        void editSection.offsetHeight;
        editSection.classList.add('visible');
    }
    if (editBtn) {
        editBtn.style.display = 'none';
    }
    if (document.getElementById('entryFeeInput')) {
        document.getElementById('entryFeeInput').value = currentValue;
    }
    document.getElementById('entryFeeStatus').innerText = '';
}

function cancelEntryFeeEdit() {
    const editSection = document.getElementById('entryFeeEditSection');
    const editBtn = document.getElementById('entryFeeEditBtn');
    if (editSection) {
        editSection.classList.remove('visible');
        setTimeout(() => {
            editSection.style.display = 'none';
        }, 200);
    }
    if (editBtn) {
        editBtn.style.display = 'inline-flex';
    }
    document.getElementById('entryFeeStatus').innerText = '';
}

function enterPayboxLinkEditMode() {
    const editSection = document.getElementById('payboxLinkEditSection');
    const editBtn = document.getElementById('payboxLinkEditBtn');
    const currentUrl = document.getElementById('adminPayboxLinkVal').innerText;
    const currentValue = currentUrl !== 'לא הוגדר' ? currentUrl : '';

    if (editSection) {
        editSection.style.display = 'block';
        void editSection.offsetHeight;
        editSection.classList.add('visible');
    }
    if (editBtn) {
        editBtn.style.display = 'none';
    }
    if (document.getElementById('payboxLinkInput')) {
        document.getElementById('payboxLinkInput').value = currentValue;
    }
    document.getElementById('payboxLinkStatus').innerText = '';
}

function cancelPayboxLinkEdit() {
    const editSection = document.getElementById('payboxLinkEditSection');
    const editBtn = document.getElementById('payboxLinkEditBtn');
    if (editSection) {
        editSection.classList.remove('visible');
        setTimeout(() => {
            editSection.style.display = 'none';
        }, 200);
    }
    if (editBtn) {
        editBtn.style.display = 'inline-flex';
    }
    document.getElementById('payboxLinkStatus').innerText = '';
}

async function savePayboxLink() {
    const link = document.getElementById('payboxLinkInput').value.trim();
    const adminUserId = getCurrentSessionUserId();
    const statusDiv = document.getElementById('payboxLinkStatus');
    if (link !== '' && !/^https?:\/\//.test(link)) {
        statusDiv.style.color = '#d32f2f';
        statusDiv.innerText = 'הקישור חייב להתחיל ב-https:// או http://';
        return;
    }

    try {
        const res = await fetch(`/api/groups/${CURRENT_GROUP_ID}/update-paybox-link`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ payboxLink: link, adminUserId })
        });
        const data = await res.json();
        if (data.success) {
            statusDiv.style.color = '#28a745';
            statusDiv.innerText = 'קוד ה-PayBox עודכן בהצלחה.';
            loadAdminPanel();
            cancelPayboxLinkEdit();
        } else {
            statusDiv.style.color = '#d32f2f';
            statusDiv.innerText = data.message || 'שגיאה בעדכון קישור PayBox.';
        }
    } catch (error) {
        console.error('Error updating PayBox link:', error);
        statusDiv.style.color = '#d32f2f';
        statusDiv.innerText = 'שגיאה בעדכון קישור PayBox';
    }
}

async function saveEntryFee() {
    const amount = Number(document.getElementById('entryFeeInput').value);
    const adminUserId = getCurrentSessionUserId();
    const statusDiv = document.getElementById('entryFeeStatus');
    if (isNaN(amount) || amount < 0) {
        statusDiv.innerText = 'נא להזין סכום תקין חיובי.';
        return;
    }

    try {
        const res = await fetch(`/api/groups/${CURRENT_GROUP_ID}/update-entry-fee`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ entryFee: amount, adminUserId })
        });
        const data = await res.json();
        if (data.success) {
            statusDiv.style.color = '#28a745';
            statusDiv.innerText = 'עלות הכניסה עודכנה בהצלחה.';
            loadAdminPanel();
            cancelEntryFeeEdit();
        } else {
            statusDiv.style.color = '#d32f2f';
            statusDiv.innerText = 'שגיאה בעדכון עלות ההשתתפות.';
        }
    } catch (error) {
        console.error('Error updating entry fee:', error);
        statusDiv.style.color = '#d32f2f';
        statusDiv.innerText = 'שגיאה בעדכון עלות ההשתתפות';
    }
}

// שליפת ה-groupId מה-URL
// const urlParams = new URLSearchParams(window.location.search);
// const groupId = urlParams.get('groupId');

async function lockGroupBets() {
    const lockMode = document.querySelector('input[name="lockMode"]:checked').value;
    const adminUserId = getCurrentSessionUserId();
    
    if(!confirm("האם אתה בטוח שברצונך לנעול את ההימורים? לא ניתן יהיה לבטל פעולה זו!")) return;

    try {
        const res = await fetch(`/api/groups/${CURRENT_GROUP_ID}/lock`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lockMode, adminUserId })
        });
        const data = await res.json();
        
        if(data.success) {
            alert("🔒 הטורניר ננעל! ההימורים סגורים רשמית.");
            location.reload(); // רענון הדף כדי לעדכן את התצוגה
        }
    } catch (error) {
        console.error("Error locking bets:", error);
        alert("שגיאה בנעילת ההימורים");
    }
}

function enterGroupNameEditMode() {
    const card = document.getElementById('groupNameCard');
    const edit = document.getElementById('groupNameEditSection');
    const btn = document.getElementById('editGroupNameBtn');
    if (card && edit) {
        // show card and edit with fade
        card.style.display = 'block';
        // force reflow then add visible class
        void card.offsetHeight;
        card.classList.add('visible');

        edit.style.display = 'block';
        void edit.offsetHeight;
        edit.classList.add('visible');
    }
    if (btn) btn.style.display = 'none';
    if (document.getElementById('groupNameInput')) {
        document.getElementById('groupNameInput').value = document.getElementById('groupNameText').innerText || '';
    }
    document.getElementById('groupNameStatus').innerText = '';
}

function cancelGroupNameEdit() {
    const card = document.getElementById('groupNameCard');
    const edit = document.getElementById('groupNameEditSection');
    const btn = document.getElementById('editGroupNameBtn');
    if (edit) {
        edit.classList.remove('visible');
        // after transition hide
        setTimeout(() => { edit.style.display = 'none'; }, 200);
    }
    if (card) {
        card.classList.remove('visible');
        setTimeout(() => { card.style.display = 'none'; if (btn) btn.style.display = 'inline-flex'; }, 220);
    } else if (btn) {
        btn.style.display = 'inline-flex';
    }
    document.getElementById('groupNameStatus').innerText = '';
}

async function updateGroupName() {
    const urlParams = new URLSearchParams(window.location.search);
    const groupId = urlParams.get('groupId');
    const sessions = JSON.parse(localStorage.getItem('worldcup_sessions') || '{}');
    const currentUserId = sessions[groupId]?.userId;

    const newGroupName = document.getElementById('groupNameInput').value;
    const statusDiv = document.getElementById('groupNameStatus');

    try {
        const res = await fetch(`/api/groups/${groupId}/update-name`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ newGroupName, currentUserId })
        });
        const data = await res.json();
        if (data.success) {
            statusDiv.style.color = "green";
            statusDiv.innerText = "🏆 שם הקבוצה עודכן בהצלחה!";
            document.getElementById('groupNameText').innerText = newGroupName;
            if (document.getElementById('groupNameInput')) {
                document.getElementById('groupNameInput').value = newGroupName;
            }
            const card = document.getElementById('groupNameCard');
            const edit = document.getElementById('groupNameEditSection');
            const btn = document.getElementById('editGroupNameBtn');
            if (edit) { edit.classList.remove('visible'); setTimeout(() => { edit.style.display = 'none'; }, 200); }
            if (card) { card.classList.remove('visible'); setTimeout(() => { card.style.display = 'none'; if (btn) btn.style.display = 'inline-flex'; }, 220); } else if (btn) { btn.style.display = 'inline-flex'; }
            // עדכון כותרת העמוד הראשית במידת הצורך
            if(document.getElementById('groupTitle')) {
                document.getElementById('groupTitle').innerText = data.group_name;
            }
            if (document.getElementById('groupSubTitleText')) {
                document.getElementById('groupSubTitleText').innerText = `ניהול קבוצת: ${newGroupName}`;
            } else {
                document.getElementById('groupSubTitle').innerText = `ניהול קבוצת: ${newGroupName}`;
            }
        } else {
            statusDiv.style.color = "red";
            statusDiv.innerText = data.message;
        }
    } catch (e) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "שגיאה בתקשורת עם השרת";
    }
}
    // מומלץ להוסיף בטעינת הדף (ב-fetch של נתוני הקבוצה באדמין) בדיקה:
    // אם group.betsLocked === true -> תעלים את כפתור הנעילה ותכתוב "הטורניר נעול 🔒"
loadAdminPanel();

</script>
