<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/design-system.css">
    <script defer src="/stage2-localization.js"></script>
    <title>לוח תוצאות וניחושים</title>
    <style>
        body { font-family: system-ui, Arial; background: #eef2f3; padding: 20px; direction: rtl; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1e3c72; text-align: center; margin-top: 0; }
        .group-title { text-align: center; color: #7f8c8d; font-size: 18px; font-weight: bold; margin-bottom: 10px; background: #f8f9fa; padding: 8px; border-radius: 6px; }
        
        /* תיבת קופה פיננסית */
        .pot-box { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-around; text-align: center; }
        .pot-item { flex: 1; }
        .pot-value { font-size: 22px; font-weight: bold; color: #2e7d32; margin-top: 5px; }
        .pot-label { font-size: 13px; color: #558b2f; }

        .stats-box { background: #e8f4fd; border: 1px solid #bee5eb; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .stats-title { font-weight: bold; color: #0c5460; margin-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #1e3c72; color: white; font-weight: bold; }
        tr:hover { background-color: #f1f1f1; }
        
        .badge-paid { background: #28a745; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-unpaid { background: #ffc107; color: #333; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-spectator { background: #dc3545; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        
        .standings-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .standings-table th, .standings-table td { padding: 8px 6px; text-align: right; border-bottom: 1px solid #ddd; }
        .standings-table th { background-color: #6f42c1; color: white; font-weight: bold; }
        .standings-table tr:hover { background-color: #f5f5f5; }
        .standings-rank { font-weight: bold; color: #1e3c72; min-width: 30px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn { padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 14px; text-decoration: none; cursor: pointer; border: none; }
        .btn-back { background: #6c757d; color: white; }
        .btn-share { background: #25D366; color: white; }
        .btn-share:hover { background: #1ebd59; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <a href="/index.html" class="btn btn-back">⬅️ לובי קבוצות</a>
        <button class="btn btn-share" onclick="copyInviteLink()">📋 העתק לינק הזמנה לחברים</button>
    </div>

    <h1 id="groupName">📊 לוח התוצאות</h1>
    <div id="groupSubTitle" class="group-title">טוען נתונים...</div>

    <div class="pot-box">
        <div class="pot-item">
            <div class="pot-label">💰 עלות כניסה</div>
            <div id="feeVal" class="pot-value">0 ₪</div>
        </div>
        <div class="pot-item" style="border-right: 1px solid #c8e6c9; border-left: 1px solid #c8e6c9;">
            <div class="pot-label">👥 משתתפים ששילמו</div>
            <div id="paidCountVal" class="pot-value">0</div>
        </div>
        <div class="pot-item">
            <div class="pot-label">🏆 סך הכל בקופה למנצח</div>
            <div id="totalPotVal" class="pot-value" style="font-size: 26px; color: #1b5e20;">0 ₪</div>
        </div>
    </div>

    <div class="stats-box">
        <div class="stats-title">📊 תובנות מהקבוצה:</div>
        <div id="statsContent">מחשב נתונים סטטיסטיים...</div>
    </div>

    <div id="standingsSection" style="display: none; margin-bottom: 25px;">
        <h3>🏆 טבלת בתי המונדיאל</h3>
        <div id="standingsContainer">
            <p style="text-align: center; color: #999;">טוען נתוני טבלה מ-football-data.org...</p>
        </div>
    </div>

    <h3>👥 חברי הקבוצה והניחושים שלהם:</h3>
    <table>
        <thead>
            <tr>
                <th>שם המשתתף</th>
                <th>🥇 אלופה</th>
                <th>🥈 סגנית</th>
                <th>⚽ מלך השערים</th>
                <th>💰 סטטוס</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
    </table>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const CURRENT_GROUP_ID = urlParams.get('groupId') || "group_test123";
    let globalGroupName = "";

    const translations = {
        "Argentina": "Argentina 🇦🇷", "Brazil": "Brazil 🇧🇷", "France": "France 🇫🇷", "Germany": "Germany 🇩🇪",
        "Mbappe": "Kylian Mbappe 🇫🇷", "Messi": "Lionel Messi 🇦🇷", "Kane": "Harry Kane 🏴", "Ronaldo": "Cristiano Ronaldo 🇵🇹"
    };
    const teamLabelMap = {
        ...translations,
        // Top scorers ids saved by bet form.
        mbappe: "Kylian Mbappe (France)",
        haaland: "Erling Haaland (Norway)",
        vinicius: "Vinicius Junior (Brazil)",
        bellingham: "Jude Bellingham (England)",
        kane: "Harry Kane (England)",
        messi: "Lionel Messi (Argentina)",
        ronaldo: "Cristiano Ronaldo (Portugal)",
        yamal: "Lamine Yamal (Spain)",
        musiala: "Jamal Musiala (Germany)",
        martinez: "Lautaro Martinez (Argentina)",
        lewandowski: "Robert Lewandowski (Poland)",
        alvarez: "Julian Alvarez (Argentina)",
        other: "Other player"
    };

    async function loadWorldCupTeamsForLeaderboard() {
        try {
            const res = await fetch('/api/teams/WC');
            const data = await res.json();
            if (!res.ok || !data.success) {
                console.warn('Could not load WC teams for leaderboard', data);
                return;
            }

            (data.teams || []).forEach(team => {
                const label = team.tla ? `${team.name} (${team.tla})` : team.name;
                // Support predictions saved either by team name or numeric team id.
                teamLabelMap[String(team.id)] = label;
                teamLabelMap[team.name] = label;
                if (team.shortName) {
                    teamLabelMap[team.shortName] = label;
                }
                if (team.tla) {
                    teamLabelMap[team.tla] = label;
                }
            });
        } catch (error) {
            console.error('Error loading WC teams for leaderboard:', error);
        }
    }

    function formatTeamLabel(teamKey) {
        if (!teamKey) return 'No prediction yet';
        const normalizedKey = String(teamKey);
        const lowerKey = normalizedKey.toLowerCase();
        return teamLabelMap[normalizedKey] || teamLabelMap[lowerKey] || teamLabelMap[teamKey] || teamKey;
    }

    async function loadWCStandings() {
        const container = document.getElementById('standingsContainer');
        const section = document.getElementById('standingsSection');
        if (!container || !section) return;

        try {
            const res = await fetch('/api/wc-standings');
            const data = await res.json();

            if (!res.ok || !data.success) {
                console.warn('Could not load WC standings', data);
                container.innerHTML = '<p style="color: #d32f2f;">לא ניתן לטעון את טבלת הבתים</p>';
                section.style.display = 'block';
                return;
            }

            if (!data.standings || data.standings.length === 0) {
                container.innerHTML = '<p style="color: #999;">אין נתוני טבלה זמינים כרגע</p>';
                section.style.display = 'block';
                return;
            }

            // Find the group stage standings (usually first in the list)
            const groupStage = data.standings.find(s => s.type === 'TOTAL') || data.standings[0];
            if (!groupStage || !groupStage.table) {
                container.innerHTML = '<p style="color: #999;">אין נתוני טבלת בתים זמינים</p>';
                section.style.display = 'block';
                return;
            }

            // Build standings table
            const html = `
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th style="min-width: 25px;">מקום</th>
                            <th>נבחרת</th>
                            <th>משחקים</th>
                            <th>ניצחונות</th>
                            <th>תיקו</th>
                            <th>הפסדים</th>
                            <th>שערים</th>
                            <th>נקודות</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${(groupStage.table || []).map(team => `
                            <tr>
                                <td class="standings-rank">${team.position}</td>
                                <td>${team.team.name}</td>
                                <td>${team.playedGames}</td>
                                <td>${team.won}</td>
                                <td>${team.draw}</td>
                                <td>${team.lost}</td>
                                <td>${team.goalsFor - team.goalsAgainst >= 0 ? '+' : ''}${team.goalsFor - team.goalsAgainst}</td>
                                <td style="font-weight: bold; color: #1e3c72;">${team.points}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = html;
            section.style.display = 'block';
        } catch (error) {
            console.error('Error loading WC standings:', error);
            container.innerHTML = '<p style="color: #d32f2f;">שגיאה בטעינת טבלת הבתים</p>';
            section.style.display = 'block';
        }
    }

    async function loadLeaderboard() {
        try {
            const res = await fetch(`/api/groups/${CURRENT_GROUP_ID}`);
            if (!res.ok) return;

            const data = await res.json();
            const group = data.group;
            const predictions = data.predictions || {};

            globalGroupName = group.group_name;
            document.getElementById('groupSubTitle').innerText = `קבוצה: ${globalGroupName}`;

            // 🔥 שליפת מצב הנעילה מהשרת
            const isLocked = group.betsLocked || false;
            const lockMode = group.unpaidLockMode || 'spectator';

            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = ""; 

            const memberIds = Object.keys(group.members || {});
            
            // לוגיקה פיננסית
            const entryFee = group.entry_fee || 0; 
            let paidCount = 0;
            const teamCounts = {};
            
            memberIds.forEach(userId => {
                const memberInfo = group.members[userId];
                const userPred = predictions[userId] || {};
                let userName = memberInfo.userName || "משתתף זמני"; 
                const hasPaid = memberInfo.has_paid || false;

                // 🔥🔥🔥 לוגיקת סינון/צפייה למשתמשים שלא שילמו כשהטורניר נעול
                if (!hasPaid && isLocked) {
                    if (lockMode === 'remove') {
                        return; // 🛑 הסרה מוחלטת: מדלג על המשתמש ולא מציג אותו בטבלה
                    } else if (lockMode === 'spectator') {
                        // משאיר כצופה: מוסיף סימון לשם (הניקוד שלו יישאר 0 ממילא בחישוב העתידי)
                        userName = `${userName} (צופה) 🚫`;
                    }
                }

                if(hasPaid) {
                    paidCount++; // ספירת המשלמים האמיתיים לקופה
                }

                const rawFirst = userPred.teams ? userPred.teams.first : "";
                const rawSecond = userPred.teams ? userPred.teams.second : "";
                const rawScorer = userPred.scorers ? userPred.scorers.first : "";

                // סופר סטטיסטיקה רק עבור מי שמשתתף בפועל (לא עבור מי שהוסר)
                if (rawFirst) teamCounts[rawFirst] = (teamCounts[rawFirst] || 0) + 1;

                // קביעת הבאדג' המתאים לפי סטטוס התשלום והנעילה
                let paidBadge = "";
                if (hasPaid) {
                    paidBadge = `<span class="badge-paid">שולם</span>`;
                } else if (isLocked && lockMode === 'spectator') {
                    paidBadge = `<span class="badge-spectator">צופה בלבד</span>`;
                } else {
                    paidBadge = `<span class="badge-unpaid">טרם שולם</span>`;
                }

                const row = `
                    <tr>
                        <td><strong>${userName}</strong></td>
                        <td>${formatTeamLabel(rawFirst)}</td>
                        <td>${formatTeamLabel(rawSecond)}</td>
                        <td>${formatTeamLabel(rawScorer)}</td>
                        <td>${paidBadge}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // עדכון תיבת הקופה על המסך
            document.getElementById('feeVal').innerText = `${entryFee} ₪`;
            document.getElementById('paidCountVal').innerText = paidCount;
            document.getElementById('totalPotVal').innerText = `${paidCount * entryFee} ₪`;

            calculateGroupStats(teamCounts);

        } catch (error) {
            console.error(error);
        }
    }

    // פונקציית העתקת לינק הזמנה חכמה ישירות מהלידרבורד
    function copyInviteLink() {
        const baseUrl = window.location.origin;
        const inviteUrl = `${baseUrl}/bet.html?groupId=${CURRENT_GROUP_ID}`;
        
        const textToCopy = `🏆 הצטרפו לטורניר הימורי המונדיאל של קבוצת "${globalGroupName}"! \n🎯 לכניסה והזנת הניחוש שלכם לחצו כאן: ${inviteUrl}`;
        
        navigator.clipboard.writeText(textToCopy);
        alert('📋 הודעת ההזמנה וקישור ההרשמה לקבוצה הועתקו בהצלחה! עכשיו אפשר להדביק אותם ישירות בוואטסאפ לחברים חדשים.');
    }

    function calculateGroupStats(teamCounts) {
        const teams = Object.keys(teamCounts);
        if (teams.length === 0) {
            document.getElementById('statsContent').innerText = "עדיין לא הוזנו ניחושים.";
            return;
        }
        let favoriteTeam = ""; let maxVotes = 0;
        teams.forEach(team => {
            if (teamCounts[team] > maxVotes) { maxVotes = teamCounts[team]; favoriteTeam = team; }
        });
        document.getElementById('statsContent').innerHTML = `🔥 הנבחרת הפייבוריטית בקבוצה היא **${formatTeamLabel(favoriteTeam)}** (${maxVotes} מנחשים).`;
    }

    async function initializeLeaderboardPage() {
        await loadWorldCupTeamsForLeaderboard();
        await Promise.all([loadLeaderboard(), loadWCStandings()]);
    }

    initializeLeaderboardPage();
</script>
</body>
</html>
